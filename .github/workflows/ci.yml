name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Mirrors the local test setup: conftest.py hardcodes localhost:5433 and
      # drops/recreates every table, so this is a throwaway Postgres.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lexi
          POSTGRES_PASSWORD: lexi
          POSTGRES_DB: lexi
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U lexi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  frontend:
    name: frontend (tsc + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Match the local dev toolchain. Node 20 ships npm 10, which reads the
          # bundled-dependency entries in package-lock.json differently and makes
          # `npm ci` reject a lockfile npm 11 wrote as "out of sync".
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Not `npm ci`: the lockfile is written on Windows, where npm never
      # installs @tailwindcss/oxide-wasm32-wasi (cpu wasm32) and so omits two of
      # its bundled deps (@emnapi/core, @emnapi/runtime). On Linux npm wants
      # them and `npm ci` hard-fails as "out of sync". Regenerating the lock
      # doesn't help — the omission comes back every install. `npm install`
      # still honours every pinned version in the lock; it just tops up that
      # optional subtree instead of refusing to run.
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run lint
