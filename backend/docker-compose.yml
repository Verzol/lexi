services:
  db:
    image: postgres:16
    container_name: lexi-postgres
    environment:
      POSTGRES_USER: lexi
      POSTGRES_PASSWORD: lexi
      POSTGRES_DB: lexi
    ports:
      # 5433 on the host, to avoid colliding with any local Postgres on 5432.
      - "5433:5432"
    volumes:
      - lexi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexi -d lexi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lexi_pgdata:
