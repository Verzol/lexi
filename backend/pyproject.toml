[project]
name = "lexi-backend"
version = "0.1.0"
description = "Lexi — teacher-curated English vocabulary app. FastAPI backend."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "alembic>=1.14",
    "psycopg[binary]>=3.2",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "email-validator>=2.2",
    "pyjwt>=2.10",
    "argon2-cffi>=23.1",
    "fsrs>=5.0",
    "anthropic>=0.116.0",
    "apscheduler>=3.10",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.8",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Migration bodies are autogenerated by Alembic; don't fight their formatting.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# `Depends(...)` / `Cookie(...)` in argument defaults is the FastAPI idiom, not a B008 bug.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Cookie",
    "fastapi.Query",
    "fastapi.Body",
    "fastapi.Path",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
